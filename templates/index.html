<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <title>Luna AI Assistant</title>
    <style>
        body {
             background: linear-gradient(135deg, #0f172a, #1e1b4b);
             color: #f8fafc;
             fontfamily: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
             display: flex;
             flex-direction: column;
             align-items: center;
             justify-content: center;
             min-height: 100vh;
             margin: 0;
        }
        h1 {
            colour: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            margin-bottom: 20px;
        }

        /* Chat box where messages will appear */
        #chat-container {
            width: 90%;
            max-width: 600px;
            height: 400px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .user-message {
            background: #0369a1;
            margin-left: auto;
            text-align: right;
        }

        .luna-message {
            background-color: #1e293b;
            margin-right: auto;
            border-left: 3px solid #38bdf8;
        }

        /* Input area styling */
        .input-area {
            display: flex;
            width: 90%;
            max-width: 600px;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        button {
            padding: 12px 24px;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0284c7;
        }
    </style>
</head>
<body>
        <h1>Luna AI Assistant</h1>
        
        <div id="chat-container">
            <div class="message luna-message">Luna: Onclick and ready, boss.</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Say something to Luna..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');

        // If it can't find the element, stop
        if (!inputField || !chatContainer) return;

        const messageText = inputField.value.trim();
        if (!messageText) return;
        
        // 1. Force the message onto the screen immediately
        const userDivb = document.createElement('div');
        userDivb.className = 'message user-message';
        userDivb.innerText = messageText;

        chatContainer.appendChild(userDivb);

        // Clear input field and scroll down 
        inputField.value = '';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            // 2. Pointing to your exact backend route: /chat 
            //  Talk to Flask, send the message, and wait for the response
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: messageText }),
            });

            const data = await response.json();

            // 3. Matching your backend JSON key: data.reply
            const lunaDiv = document.createElement('div');
            lunaDiv.className = 'message luna-message';
            lunaDiv.innerText = "Luna: " + (data.reply || "No response recieved.");

            chatContainer.appendChild(lunaDiv);
        } catch (error) {
            console.error('Error:', error);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message luna-message';
            errorDiv.innerText = "Luna: System error. Check server logs.";

            chatContainer.appendChild(errorDiv);
        }

        // Scroll to the bottom again
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
