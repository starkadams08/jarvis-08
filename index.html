<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0b0f19;
        color: #00d4ff;
        fontfamily: 'Segoe UI', sans-serif; }
        #reply {
            border-left: 3px solid #00d4ff;
            padding-left: 15px;
            margin-top: 20px;
            transition: all 0.5s ease;
        }
        input { 
            background: #161b22;
            border: 1px solid #30363d;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        button {
             background: #00d4ff;
             color: black;
             font-weight: bold;
             cursor: pointer;
             border: none;
             padding: 10px 20px;
             border-radius: 5px;
        }

        /* Add this to your <stlye> section*/
            .pulse-ring {
                border: 3px solid #00d4ff;
                border-radius: 50%;
                height: 100px;
                width: 100px;
                position: absolute;
                animation: pulsate 2s ease-out infinite;
                opacity: 0;
            }
        @keyframe pulsate {
            0% { transform: scale(0.1, 0.1);
            opacity: 0.0; }
            50% { opacity: 1.0;}
            100% { transform: scale(1.2, 1.2); opacity: 0.0; }
        }
        
    </style>
        <title>Luna ai!</title>
    </head>
    <body>

        <h2>Luna ai! assistant</h2>
        <input id="msg" placeholder="Talk to Luna..." />
        <button onclick="send()">Send</button>

        <p id="reply"></p>
    </body>
</html>
